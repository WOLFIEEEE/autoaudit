name: CI

on:
  push:
    branches: ["**"]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  fast:
    name: Fast tests (unit + API)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Static checks
        run: |
          python -m compileall -q audit server scripts benchmarks main.py celery_app.py
          ruff check audit server scripts tests benchmarks main.py celery_app.py
          bandit -q -r audit server scripts -x tests -ll
          python scripts/gen_rules_reference.py --check

      - name: Audit Python dependencies
        run: pip-audit -r requirements.txt

      - name: Run fast tests
        # "not slow" excludes the Playwright integration test, which runs
        # in the separate `e2e` job.
        run: |
          coverage run --source=audit,server -m pytest -m "not slow" -q
          coverage report --fail-under=50

  e2e:
    name: End-to-end (Playwright + axe-core)
    runs-on: ubuntu-latest
    # e2e tests are slower; don't block merge on them but do run them.
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Install Chromium via Playwright
        run: playwright install --with-deps chromium

      - name: Vendor axe-core
        # Avoids network flakes in CI — fetch once, test against local copy.
        run: python scripts/fetch_axe.py

      - name: Run e2e tests
        run: pytest -m slow -q
