<!doctype html>
<html lang="en">
<head>
  <title>Timed refresh fixture</title>
  <!-- Triggers: timing-meta-refresh. 600s delay so the page does not
       actually reload during the audit, but the rule still fires on the
       presence of the client-side time limit. -->
  <meta http-equiv="refresh" content="600">
</head>
<body>
<main>
  <h1>Timing adjustable</h1>
  <p>This page declares a periodic meta refresh.</p>
</main>
</body></html>
