services:
  redis:
    image: redis:7-alpine
    ports:
      # Keep the unauthenticated development Redis off the LAN. Remote NVDA
      # workers should use an authenticated/TLS Redis deployment or a private
      # overlay network instead of widening this binding.
      - "127.0.0.1:6379:6379"
    restart: unless-stopped

  server:
    build: .
    depends_on:
      - redis
    environment:
      REDIS_URL: redis://redis:6379/0
      REDIS_REQUIRED: "true"
      DATABASE_URL: sqlite:////app/data/audits.db
      SKIP_NVDA: "true"
      LOG_FORMAT: "json"
      LOG_LEVEL: "INFO"
    volumes:
      - ./data:/app/data
    ports:
      - "8000:8000"
    restart: unless-stopped
    init: true
    ipc: host
    security_opt:
      - no-new-privileges:true

  worker:
    build: .
    depends_on:
      - redis
    environment:
      REDIS_URL: redis://redis:6379/0
      REDIS_REQUIRED: "true"
      DATABASE_URL: sqlite:////app/data/audits.db
      SKIP_NVDA: "true"
      LOG_FORMAT: "json"
      LOG_LEVEL: "INFO"
      CELERY_POOL: "prefork"
      CELERY_CONCURRENCY: "2"
    volumes:
      - ./data:/app/data
    command: python scripts/run_worker.py
    # No HTTP healthcheck for the worker; Celery doesn't expose an
    # endpoint by default. Orchestrators should watch the process.
    healthcheck:
      disable: true
    restart: unless-stopped
    init: true
    ipc: host
    security_opt:
      - no-new-privileges:true
