services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    restart: unless-stopped

  server:
    build: .
    depends_on:
      - redis
    environment:
      REDIS_URL: redis://redis:6379/0
      DATABASE_URL: sqlite:////app/data/audits.db
      SKIP_NVDA: "true"
    volumes:
      - ./data:/app/data
    ports:
      - "8000:8000"
    restart: unless-stopped

  worker:
    build: .
    depends_on:
      - redis
    environment:
      REDIS_URL: redis://redis:6379/0
      DATABASE_URL: sqlite:////app/data/audits.db
      SKIP_NVDA: "true"
    volumes:
      - ./data:/app/data
    command: python scripts/run_worker.py
    restart: unless-stopped
