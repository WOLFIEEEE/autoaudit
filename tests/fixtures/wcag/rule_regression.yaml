# Rule regression corpus.
#
# Each entry is a hand-crafted DOM snapshot that exercises ONE rule
# (or its negative — i.e. a snapshot that should NOT fire any rule).
# The test harness in tests/test_rule_regression.py iterates this
# file and asserts:
#
#   * every rule listed in `must_fire` fires
#   * no rule listed in `must_not_fire` fires
#
# Adding a new rule? Add a positive AND a negative case so a future
# refactor can't accidentally cause the rule to fire on every page or
# never fire at all.
#
# Snapshots match each module's `analyze(dom)` input shape — see the
# module's _EXTRACT_JS for the exact keys it consumes.

# ====================================================================
# audit/structure.py
# ====================================================================

- id: structure-title-missing
  module: structure
  dom:
    lang: "en"
    title: ""
    headings: [{level: 1, text: "x", selector: "h1", html: "<h1>x</h1>"}]
    landmarks: {main: 1, nav: 0, banner: 0, contentinfo: 0}
    tables: []
    iframes: []
    lang_of_parts: []
  must_fire: ["structure-title-missing"]
  must_not_fire: ["structure-title-too-short", "structure-title-generic"]

