# ====================================================================
# audit/live_regions.py
# ====================================================================

- id: live-region-silenced
  module: live_regions
  dom:
    - role: "alert"
      aria_live: "off"
      aria_atomic: null
      aria_relevant: null
      initial_text_length: 5
      tag: "div"
      selector: "#alert"
      html: "<div role=alert aria-live=off>boom</div>"
  must_fire: ["live-region-silenced"]
  must_not_fire: ["live-region-role-conflict"]

- id: live-region-role-conflict
  module: live_regions
  dom:
    - role: "alert"
      aria_live: "polite"
      aria_atomic: null
      aria_relevant: null
      initial_text_length: 5
      tag: "div"
      selector: "#alert"
      html: "<div role=alert aria-live=polite>boom</div>"
  must_fire: ["live-region-role-conflict"]
  must_not_fire: ["live-region-silenced"]

- id: live-region-empty-on-load
  module: live_regions
  dom:
    - role: "status"
      aria_live: ""
      aria_atomic: null
      aria_relevant: null
      initial_text_length: 0
      tag: "div"
      selector: "#status"
      html: "<div role=status></div>"
  must_fire: ["live-region-empty-on-load"]
  must_not_fire: ["live-region-silenced", "live-region-role-conflict"]

- id: live-region-healthy
  module: live_regions
  dom:
    - role: "status"
      aria_live: ""
      aria_atomic: null
      aria_relevant: null
      initial_text_length: 5
      tag: "div"
      selector: "#status"
      html: "<div role=status>Ready.</div>"
  must_fire: []
  must_not_fire:
    - live-region-silenced
    - live-region-role-conflict
    - live-region-empty-on-load

# ====================================================================
# audit/color_only.py
# ====================================================================

- id: color-only-inline-marker
  module: color_only
  dom:
    inline_markers:
      - {tag: "span", text: "Email", text_lower: "email",
         color: "rgb(220,30,30)", rgb: [220, 30, 30],
         parent_text: "Email", has_icon_child: false,
         has_icon_sibling: false, font_weight: "400",
         selector: "label > span", html: "<span>Email</span>"}
    color_only_links: []
  must_fire: ["color-only-inline-marker"]

- id: color-only-marker-with-asterisk
  module: color_only
  dom:
    inline_markers:
      - {tag: "span", text: "Email *", text_lower: "email *",
         color: "rgb(220,30,30)", rgb: [220, 30, 30],
         parent_text: "Email *", has_icon_child: false,
         has_icon_sibling: false, font_weight: "400",
         selector: "label > span", html: "<span>Email *</span>"}
    color_only_links: []
  must_fire: []
  must_not_fire: ["color-only-inline-marker"]

- id: color-only-link
  module: color_only
  dom:
    inline_markers: []
    color_only_links:
      - {text: "click here", color: "rgb(0,80,200)",
         parent_color: "rgb(20,20,20)",
         selector: "p > a", html: "<a>click here</a>"}
  must_fire: ["color-only-link"]
